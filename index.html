<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Portal</title>
    <style>
        /* মূল ব্যাকগ্রাউন্ড ও ফন্ট */
        body { background-color: #f1f1f1; color: #333; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        
        /* উপরের মেনু বার (স্ক্রিনশট অনুযায়ী) */
        header { background-color: #fff; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; overflow-x: auto; white-space: nowrap; }
        .tabs { display: flex; gap: 20px; font-size: 14px; font-weight: bold; color: #666; padding: 12px 10px; }
        .tabs span.active { color: #d9534f; border-bottom: 2px solid #d9534f; padding-bottom: 2px; }

        /* ২ কলামের ভিডিও গ্রিড */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px; }

        /* প্রতিটা ভিডিও কার্ড */
        .video-card { text-decoration: none; color: inherit; display: block; background: #fff; border-radius: 4px; overflow: hidden; }

        /* থাম্বনেইল অংশ */
        .thumb-box { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* টাইম এবং ব্যাজ */
        .duration { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.8); color: #fff; font-size: 11px; padding: 2px 4px; border-radius: 2px; font-weight: bold; }
        .live-tag { position: absolute; top: 5px; left: 5px; background: #ff0000; color: #fff; font-size: 10px; padding: 2px 5px; border-radius: 3px; font-weight: bold; }
        .badge-watched { position: absolute; bottom: 5px; left: 5px; background: rgba(0,0,0,0.6); color: #fff; font-size: 10px; padding: 2px 4px; border-radius: 2px; }

        /* ভিডিওর তথ্য */
        .info { padding: 8px 4px; position: relative; }
        .title { font-size: 13px; font-weight: bold; line-height: 1.3; height: 34px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 5px; color: #222; }
        
        .meta { display: flex; align-items: center; font-size: 11px; color: #777; gap: 4px; margin-top: 5px; }
        .avatar { width: 18px; height: 18px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
        .dots { margin-left: auto; color: #999; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="tabs">
