<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Portal</title>
    <style>
        /* স্ক্রিন ফিক্সড রাখার জন্য স্টাইল */
        html, body { 
            overflow-x: hidden; 
            width: 100%; 
            margin: 0; 
            padding: 0; 
            background-color: #f1f1f1; 
            font-family: Arial, sans-serif;
            touch-action: pan-y; /* শুধু ওপর-নিচ স্ক্রল এলাউ করবে */
        }

        /* হেডার মেনু */
        header { 
            background: #fff; 
            border-bottom: 1px solid #ddd; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .tabs { 
            display: flex; 
            gap: 15px; 
            padding: 12px 10px; 
            font-size: 13px; 
            font-weight: bold; 
            color: #666; 
            overflow-x: auto; 
            white-space: nowrap;
        }
        .tabs span.active { color: #d9534f; border-bottom: 2px solid #d9534f; }

        /* ২ কলামের ভিডিও গ্রিড */
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 5px; 
            padding: 5px; 
            width: 100%;
            box-sizing: border-box;
        }

        .video-card { 
            background: #fff; 
            text-decoration: none; 
            color: #222; 
            display: block;
            border-radius: 2px;
            overflow: hidden;
        }

        .thumb { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 4/3; 
            background: #000; 
        }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        
        .duration { 
            position: absolute; 
            bottom: 4px; 
            right: 4px; 
            background: rgba(0,0,0,0.8); 
            color: #fff; 
            font-size: 10px; 
            padding: 2px 4px; 
        }

        .info { padding: 5px; }
        .title { 
            font-size: 12px; 
            font-weight: bold; 
            line-height: 1.2; 
            max-height: 28px; 
            overflow: hidden; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
        }
        .meta { font-size: 10px; color: #777; margin-top: 3px; }
    </style>
</head>
<body>

<header>
    <div class="tabs">
        <span class="active">Related Videos</span>
        <span>From My pervy family</span>
        <span>Recommended</span>
    </div>
</header>

<div class="grid">
    <a href="তোমার_ADSTERRA_LINK" class="video-card" target="_blank">
        <div class="thumb">
            <img src="video1.jpg" alt="Video">
            <span class="duration">18:34</span>
        </div>
        <div class="info">
            <div class="title">Devar Ko Nahate Dekh Bhabhi ki HD</div>
            <div class="meta">35.6M views</div>
        </div>
    </a>

    <a href="তোমার_ADSTERRA_LINK" class="video-card" target="_blank">
        <div class="thumb">
            <img src="video2.jpg" alt="Video">
            <span class="duration">13:01</span>
        </div>
        <div class="info">
            <div class="title">Shower Surprise Turns Steamy: R</div>
            <div class="meta">25.9M views</div>
        </div>
    </a>

    <a href="তোমার_ADSTERRA_LINK" class="video-card" target="_blank">
        <div class="thumb">
            <img src="video3.jpg" alt="Video">
            <span class="duration">17:01</span>
        </div>
        <div class="info">
            <div class="title">Thick Redhead With Gigantic Tits</div>
            <div class="meta">3.6M views</div>
        </div>
    </a>

        <div class="thumb">

        <div class="info">
            <div class="title">Delivery Guy Gets the Best Tip</div>
            <div class="meta">475.5K views</div>
        </div>
    </a>
</div>

</body>
</html>
