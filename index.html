<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Hub</title>
    <style>
        /* স্ক্রিন সাইজ ঠিক রাখার জন্য স্টাইল */
        html, body { 
            overflow-x: hidden; 
            width: 100%; 
            margin: 0; 
            padding: 0; 
            touch-action: pan-y; /* জুম বন্ধ রাখবে */
        }
        .full-page-link {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; cursor: pointer;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 5px; }
        .card { background: #fff; border-radius: 2px; overflow: hidden; }
        .thumb { position: relative; width: 100%; aspect-ratio: 4/3; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .duration { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.8); color: #fff; font-size: 10px; padding: 2px 4px; }
        .info { padding: 5px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<a href="https://www.profitablecpmratenetwork.com/szmdxri1?key=5231351d1e9500c4bb782577c" target="_blank" class="full-page-link"></a>

<div class="grid">
    <div class="card">
        <div class="thumb">
            <img src="IMG_20260418_171528.png" alt="Thumbnail 1">
            <span class="duration">18:34</span>
        </div>
        <div class="info">Devar Ko Nahate Dekh Bhabhi ki HD</div>
    </div>

    <div class="card">
        <div class="thumb">
            <img src="IMG_20260418_171545.png" alt="Thumbnail 2">
            <span class="duration">Live</span>
        </div>
        <div class="info">Jasmine loves to COME!!!</div>
    </div>
</div>

</body>
</html>
