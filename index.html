<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Portal</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        
        /* Navbar Style */
        header { background-color: #1a1a1a; display: flex; align-items: center; padding: 10px; border-bottom: 2px solid #ff9000; justify-content: space-between; }
        .logo-box { display: flex; align-items: center; }
        .logo { background-color: #ff9000; color: #000; font-weight: 900; padding: 4px 8px; border-radius: 4px; font-size: 20px; text-decoration: none; margin-right: 5px; }
        .site-name { font-size: 18px; font-weight: bold; color: #fff; }

        /* Video Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 5px; }
        
        /* Video Card */
        .video-card { text-decoration: none; color: white; display: block; background: #000; margin-bottom: 10px; }
        .thumb-wrap { position: relative; width: 100%; aspect-ratio: 16/9; background: #222; overflow: hidden; }
        .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Duration Label */
        .duration { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.8); color: #fff; font-size: 11px; padding: 2px 4px; border-radius: 2px; }

        /* Video Title & Info */
        .info { padding: 5px 2px; position: relative; }
        .title { font-size: 13px; font-weight: bold; line-height: 1.2; height: 32px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-right: 15px; }
        .meta { font-size: 11px; color: #999; margin-top: 3px; }
        
        /* Three-dot icon on the right */
        .more-icon { position: absolute; right: 0; top: 5px; color: #666; font-size: 18px; }

    </style>
</head>
<body>
