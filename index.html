<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <style>
        /* তোমার দেওয়া CSS কোডটি এখানে বসানো হয়েছে */
        html, body {
            touch-action: pan-y; /* জুম বন্ধ রাখবে কিন্তু স্ক্রল করতে দেবে */
            width: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden; /* ডানে-বামে নড়াচড়া বন্ধ করবে */
            background-color: #f1f1f1;
            font-family: Arial, sans-serif;
        }

        /* পুরো পেজ ক্লিকেবল করার লেয়ার */
        .overlay-link {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            cursor: pointer;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 5px; }
        .card { background: #fff; border-radius: 2px; overflow: hidden; position: relative; }
        .thumb { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .duration { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.8); color: #fff; font-size: 10px; padding: 2px 4px; }
        .info { padding: 5px; }
        .title { font-size: 12px; font-weight: bold; color: #222; }
    </style>
</head>

</html>
