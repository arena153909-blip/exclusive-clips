<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Listings</title>
    <style>
        body { background-color: #000; color: #ccc; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background-color: #1a1a1a; padding: 15px; border-bottom: 2px solid #ff9000; display: flex; align-items: center; justify-content: start; }
        .logo { color: #000; background: #ff9000; padding: 5px 12px; font-weight: bold; border-radius: 4px; font-size: 22px; text-decoration: none; }
        
        /* Video List Container */
        .container { display: block; padding: 0; }
        
        /* Each Video Block like mobile site */
        .video-card { display: flex; align-items: flex-start; text-decoration: none; color: white; border-bottom: 1px solid #333; padding: 10px; }
        .video-card:hover { background-color: #222; }

        .thumb-box { position: relative; width: 140px; height: 95px; background: #2a2a2a; border-radius: 4px; overflow: hidden; margin-right: 15px; flex-shrink: 0; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Duration Tag in a circle or corner */
        .duration { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.85); padding: 3px 6px; font-size: 11px; border-radius: 3px; font-weight: bold; }
        
        /* Play Icon (Optional, can be removed to be closer to site) */
        /* .play-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 28px; color: rgba(255, 255, 255, 0.7); } */

        /* Right side details */
        .details { flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start; margin-top: 5px; }

        .video-title { font-size: 14px; font-weight: normal; margin-bottom: 5px; color: #fff; line-height: 1.3; font-weight: bold; }
        
        .meta { font-size: 12px; color: #999; margin-top: 2px; }
    </style>
</head>
<body>

</header>

</html>
