<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Gallery</title>
    <style>
        html, body {
            touch-action: pan-y;
            margin: 0; padding: 0;
            overflow-x: hidden; width: 100%;
            background-color: #000; font-family: Arial, sans-serif;
        }
        /* এই অংশটি ভিডিওগুলোকে ২টি কলামে পাশাপাশি রাখবে */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 5px; padding: 5px;
            width: 100%; box-sizing: border-box;
        }
        .card {
            background: #1a1a1a; border-radius: 4px;
            overflow: hidden; display: flex; flex-direction: column;
            text-decoration: none; position: relative;
        }
        .thumb {
            width: 100%; aspect-ratio: 16/9;
            background: #333; position: relative;
        }
        .thumb img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
        }
        .duration {
            position: absolute; bottom: 5px; right: 5px;
            background: rgba(0,0,0,0.8); color: #fff;
            font-size: 10px; padding: 2px 4px; border-radius: 2px;
        }
        .info { padding: 8px 5px; }
        .title {
            font-size: 11px; font-weight: bold; color: #fff;
            line-height: 1.2; height: 28px; overflow: hidden;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        }
        .ad-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; cursor: pointer;
        }
    </style>
</head>
<body>

<a href="https://www.profitablecpmratenetwork.com/szmdxri1?key=5231351d1e9500c4bb782577c" target="_blank" class="ad-layer"></a>

    <div class="card">
        <div class="thumb">
            <img src="IMG_20260418_185406.png">
            <span class="duration">12:34</span>
        </div>
        <div class="info"><div class="title">Exclusive Video 01</div></div>
    </div>

    <div class="card">
        <div class="thumb">
            <img src="IMG_20260418_185434.png">
            <span class="duration">15:20</span>
        </div>
        <div class="info"><div class="title">Exclusive Video 02</div></div>
    </div>

    <div class="card">
        <div class="thumb">
            <img src="IMG_20260418_185501.png">
            <span class="duration">08:45</span>
        </div>
        <div class="info"><div class="title">Exclusive Video 03</div></div>
    </div>

    <div class="card">
        <div class="thumb">
            <img src="IMG_20260418_185523.png">
            <span class="duration">11:10</span>

    </div>

    <div class="card">

    <div class="card">

</div>

</body>
</html>
