<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Gallery</title>
    <style>
        html, body {
            touch-action: pan-y; /* ডাবল ট্যাপ জুম বন্ধ করবে */
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            width: 100%;
            background-color: #000; /* ভিডিও সাইট কালো ব্যাকগ্রাউন্ডে ভালো লাগে */
            font-family: Arial, sans-serif;
        }

        /* এটি ভিডিওগুলোকে ২টি সমান কলামে সাজাবে */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 5px; 
            padding: 5px;
            width: 100%;
            box-sizing: border-box;
        }

        /* ভিডিও কার্ডের সাইজ এবং ডিজাইন */
        .card {
            background: #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            position: relative;
        }

        /* থাম্বনেইল বক্স */
        .thumb {
            width: 100%;
            aspect-ratio: 16/9; /* সব ছবি সমান সাইজের দেখাবে */
            background: #333;
            position: relative;
        }

        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* ছবি যেন চ্যাপ্টা না হয়ে যায় */
            display: block;
        }

        /* সময় দেখানোর বক্স */
        .duration {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: rgba(0,0,0,0.8);
            color: #fff;
            font-size: 10px;
            padding: 2px 4px;
            border-radius: 2px;
        }

        /* ভিডিও টাইটেল বক্স */
        .info {
            padding: 8px 5px;
        }

        .title {
            font-size: 11px;
            font-weight: bold;
            color: #fff;
            line-height: 1.2;
            height: 28px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2; /* ২ লাইনের বেশি হলে লুকানো থাকবে */
            -webkit-box-orient: vertical;
        }

        /* পুরো স্ক্রিন কভার করা অদৃশ্য অ্যাড লেয়ার */
        .ad-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999;
            cursor: pointer;
        }
    </style>
</head>
<body>

</body>
</html>
